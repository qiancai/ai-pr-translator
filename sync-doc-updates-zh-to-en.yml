name: Sync Doc Updates from ZH to EN # Translate doc updates based on difference between the last translation commit and the current commit

concurrency:
  group: sync-doc-updates-zh-to-en-${{ github.event_name }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 9 * * 3"  # Example: weekly on Wednesday 09:00 UTC
  workflow_dispatch:
    inputs:
      file_names:
        description: "Specify source files to translate (comma-separated list, relative to source branch root)"
        required: false
        type: string
      source_files_translation_mode:
        description: "Translate specified files incrementally or as full files"
        required: true
        type: choice
        default: incremental
        options:
          - incremental
          - full

env:
  # ─── Repo & branch configuration (customize per product) ───
  SOURCE_REPO: ${{ github.repository }}
  SOURCE_BRANCH: main
  TARGET_BRANCH: i18n-en-main
  TERMS_BRANCH: main

  # ─── ai-markdown-translator configuration ───
  AI_TRANSLATOR_REPO: qiancai/ai-markdown-translator
  # Intentionally follow main so automation picks up translator updates immediately.
  AI_TRANSLATOR_REF: main

  # ─── Translation direction ───
  SOURCE_LANGUAGE: Chinese
  TARGET_LANGUAGE: English

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.TARGET_BRANCH }}
          path: docs-target

      - name: Checkout source branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          path: docs-source
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout terms branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.TERMS_BRANCH }}
          path: docs-terms
          persist-credentials: false

      - name: Checkout ai-markdown-translator
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.AI_TRANSLATOR_REPO }}
          ref: ${{ env.AI_TRANSLATOR_REF }}
          path: ai-markdown-translator
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: ai-markdown-translator/scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r ai-markdown-translator/scripts/requirements.txt

      - name: Resolve commit range
        id: commits
        shell: bash
        working-directory: docs-target
        run: |
          set -euo pipefail

          readarray -t cursor_values < <(python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("latest_translation_commit.json").read_text(encoding="utf-8"))
          print((data.get("target") or "").strip())
          print((data.get("sha") or "").strip())
          PY
          )

          cursor_target="${cursor_values[0]:-}"
          base_ref="${cursor_values[1]:-}"
          head_ref="$(git -C "${GITHUB_WORKSPACE}/docs-source" rev-parse HEAD)"

          if [ -z "${base_ref}" ]; then
            echo "latest_translation_commit.json does not contain a source sha" >&2
            exit 1
          fi

          if [ -n "${cursor_target}" ] && [ "${cursor_target}" != "${SOURCE_BRANCH}" ]; then
            echo "latest_translation_commit.json target is ${cursor_target}, expected ${SOURCE_BRANCH}" >&2
            exit 1
          fi

          echo "base_ref=${base_ref}" >> "${GITHUB_OUTPUT}"
          echo "head_ref=${head_ref}" >> "${GITHUB_OUTPUT}"

      - name: Resolve source file filter
        id: source_files
        shell: bash
        env:
          INPUT_FILE_NAMES: ${{ inputs.file_names || '' }}
          BASE_REF: ${{ steps.commits.outputs.base_ref }}
          HEAD_REF: ${{ steps.commits.outputs.head_ref }}
          DOCS_SOURCE_PATH: ${{ github.workspace }}/docs-source
          TARGET_CURSOR_PATH: ${{ github.workspace }}/docs-target/latest_translation_commit.json
        run: |
          set -euo pipefail

          if [[ -n "$INPUT_FILE_NAMES" ]]; then
            echo "files=${INPUT_FILE_NAMES}" >> "${GITHUB_OUTPUT}"
            echo "has_source_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Using user-specified files: ${INPUT_FILE_NAMES}"
            exit 0
          fi

          CHANGED_FILES=$(git -C "$DOCS_SOURCE_PATH" diff --name-only "${BASE_REF}..${HEAD_REF}" -- '*.md' 2>/dev/null || true)

          PENDING_FILES=""
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            PENDING_FILES=$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(
              Path(os.environ["TARGET_CURSOR_PATH"]).read_text(encoding="utf-8")
          )
          pending = data.get("pending")
          if isinstance(pending, dict):
              print(",".join(sorted(path for path in pending if isinstance(path, str))))
          PY
            )
          fi

          if [[ -z "$CHANGED_FILES" ]]; then
            if [[ -n "$PENDING_FILES" ]]; then
              echo "files=${PENDING_FILES}" >> "${GITHUB_OUTPUT}"
              echo "has_source_changes=true" >> "${GITHUB_OUTPUT}"
              echo "No new global changes; retrying pending files: ${PENDING_FILES}"
            else
              echo "has_source_changes=false" >> "${GITHUB_OUTPUT}"
              echo "No source markdown changes found between ${BASE_REF} and ${HEAD_REF}."
            fi
          else
            FILES_CSV=$(echo "$CHANGED_FILES" | paste -sd ',' -)
            echo "files=${FILES_CSV}" >> "${GITHUB_OUTPUT}"
            echo "has_source_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changed files: ${FILES_CSV}"
          fi

      - name: Run commit sync workflow
        id: sync
        if: steps.source_files.outputs.has_source_changes == 'true'
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
          DEEPSEEK_API_TOKEN: ${{ secrets.DEEPSEEK_API_TOKEN }}
          GEMINI_API_TOKEN: ${{ secrets.GEMINI_API_TOKEN }}
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
          TARGET_REPO: ${{ env.SOURCE_REPO }}
          SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
          SOURCE_BASE_REF: ${{ steps.commits.outputs.base_ref }}
          SOURCE_HEAD_REF: ${{ steps.commits.outputs.head_ref }}
          SOURCE_FOLDER: ""
          SOURCE_FILES: ${{ steps.source_files.outputs.files }}
          SOURCE_FILES_TRANSLATION_MODE: ${{ inputs.source_files_translation_mode || 'incremental' }}
          SOURCE_LANGUAGE: ${{ env.SOURCE_LANGUAGE }}
          TARGET_LANGUAGE: ${{ env.TARGET_LANGUAGE }}
          SOURCE_REPO_PATH: ${{ github.workspace }}/docs-source
          TARGET_REF: ${{ env.TARGET_BRANCH }}
          PREFER_LOCAL_TARGET_FOR_READ: "true"
          TARGET_REPO_PATH: ${{ github.workspace }}/docs-target
          AI_PROVIDER: azure
          TERMS_PATH: ${{ github.workspace }}/docs-terms/resources/terms.md
          FAIL_ON_TRANSLATION_ERROR: "true"
        run: |
          set -euo pipefail
          cd ai-markdown-translator/scripts
          python commit_sync_workflow.py

      - name: Prepare translated changes
        id: changes
        if: always() && steps.source_files.outputs.has_source_changes == 'true'
        shell: bash
        working-directory: docs-target
        env:
          HEAD_REF: ${{ steps.commits.outputs.head_ref }}
          SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
          FAILURE_REPORT: ${{ github.workspace }}/ai-markdown-translator/scripts/temp_output/translation-failures.md
        run: |
          set -euo pipefail

          if [ -s "${FAILURE_REPORT}" ]; then
            {
              echo "failure_summary<<EOF"
              cat "${FAILURE_REPORT}"
              echo
              echo "> Before merging this PR, manually translate the failed files above or rerun this workflow with workflow_dispatch and file_names set to those paths."
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          cursor_path = Path("latest_translation_commit.json")
          data = json.loads(cursor_path.read_text(encoding="utf-8"))
          expected_target = os.environ["SOURCE_BRANCH"]
          expected_sha = os.environ["HEAD_REF"]
          if data.get("target") != expected_target or data.get("sha") != expected_sha:
              raise SystemExit(
                  "Commit sync did not finalize latest_translation_commit.json; "
                  "refusing to advance or push a partial run after an unexpected failure."
              )
          PY
          else
            echo "Skipping latest_translation_commit.json verification for ${GITHUB_EVENT_NAME} run."
          fi

          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"

      - name: Set build metadata
        id: build_meta
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          echo "date=$(date -u +'%Y-%m-%d')" >> "${GITHUB_OUTPUT}"
          echo "id=$(date -u +'%Y%m%d')-$(date +%s)" >> "${GITHUB_OUTPUT}"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          path: docs-target
          token: ${{ github.token }}
          branch: translation/zh-to-en-${{ steps.build_meta.outputs.id }}
          base: ${{ env.TARGET_BRANCH }}
          title: "translation: sync ZH doc changes to EN on ${{ steps.build_meta.outputs.date }}"
          labels: |
            translation/auto
          body: |
            ### What is changed, added or deleted?

            Translate documentation changes from `${{ env.SOURCE_BRANCH }}` (Chinese) to English via `ai-markdown-translator` commit-diff sync.

            Source commit diff:

            https://github.com/${{ env.SOURCE_REPO }}/compare/${{ steps.commits.outputs.base_ref }}...${{ steps.commits.outputs.head_ref }}

            ### Details

            - Source repo: `${{ env.SOURCE_REPO }}`
            - Source branch: `${{ env.SOURCE_BRANCH }}`
            - Target branch: `${{ env.TARGET_BRANCH }}`
            - Source files: `${{ steps.source_files.outputs.files }}`
            - Sync outcome: `${{ steps.sync.outcome }}`

            ${{ steps.changes.outputs.failure_summary }}
          delete-branch: true
